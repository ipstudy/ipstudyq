<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>族語直播課：真心話大調查</title>
    <style>
        body {
            font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background-color: #Fdf6e3;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            padding: 30px;
            box-sizing: border-box;
            position: relative;
        }

        h1, h2 { text-align: center; color: #ff8c00; }

        /* 承辦人填寫區樣式 */
        .admin-form { display: flex; flex-direction: column; gap: 20px; }
        .admin-form label { font-size: 1.2rem; font-weight: bold; }
        .admin-form input {
            padding: 15px; font-size: 1.2rem; border: 2px solid #ddd; border-radius: 10px; outline: none;
        }
        .reminder {
            color: #e74c3c; font-size: 0.95rem; font-weight: bold; text-align: center;
            background-color: #fdeaea; padding: 12px; border-radius: 8px; margin-bottom: 20px;
        }

        /* 頂部進度條與返回按鈕區塊 */
        .survey-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        /* ★ 更新：讓「上一題」按鈕支援注音排版 ★ */
        .btn-back-top {
            display: flex;
            align-items: center;
            background-color: #ecf0f1;
            color: #333;
            border: none;
            border-radius: 12px;
            padding: 8px 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-back-top:hover { background-color: #bdc3c7; }
        .btn-back-top .bpmf-container { margin-bottom: 0; gap: 0; }
        .btn-back-top .bpmf-char { font-size: 1.1rem; }
        .btn-back-top .bpmf-symbols { font-size: 0.5rem; }
        .btn-back-top .bpmf-tone { right: -8px; font-size: 0.5rem; }
        .btn-back-top .bpmf-tone-light { top: -8px; font-size: 0.5rem; }

        /* 進度條 */
        .progress-container { 
            flex-grow: 1; 
            background-color: #eee; 
            border-radius: 10px; 
            height: 15px; 
            overflow: hidden; 
        }
        .progress-bar { height: 100%; background-color: #4CAF50; width: 0%; transition: width 0.3s ease; }

        /* 底部送出按鈕 */
        .btn-container { display: flex; justify-content: center; margin-top: 30px; }
        .btn-next, .btn-submit {
            padding: 12px 30px; border: none; border-radius: 50px; cursor: pointer;
            transition: 0.3s; font-weight: bold; font-size: 1.2rem;
            background-color: #ff8c00; color: white;
        }
        .btn-next:hover, .btn-submit:hover { background-color: #e67e22; }

        /* 問卷卡片 */
        .question-card { display: none; flex-direction: column; align-items: center; text-align: center; animation: fadeIn 0.4s ease; }
        .question-card.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ★ 注音排版 ★ */
        .bpmf-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 2px; margin-bottom: 25px; line-height: 1.6; }
        .bpmf-word { display: inline-flex; align-items: center; margin: 0 3px; }
        .bpmf-char { font-size: 2.2rem; font-weight: bold; }
        .bpmf-symbols { display: inline-flex; flex-direction: column; position: relative; font-size: 0.8rem; margin-left: 2px; line-height: 1.1; }
        .bpmf-tone { position: absolute; right: -10px; top: 50%; transform: translateY(-50%); font-size: 0.8rem; }
        .bpmf-tone-light { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); font-size: 0.8rem; }
        .bpmf-punct { font-size: 2.2rem; font-weight: bold; margin: 0 2px; display: flex; align-items: center; }

        /* 選項按鈕 */
        .options-grid { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
        .option-btn {
            display: flex; flex-direction: row; align-items: center; padding: 12px 20px;
            border-radius: 15px; border: 3px solid transparent; cursor: pointer;
            width: 100%; max-width: 600px; transition: 0.2s; box-sizing: border-box;
        }
        .option-btn.selected { border-color: #666; background-color: #fff !important; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .opt-1 { background-color: #FFD1DC; } .opt-2 { background-color: #FFE4B5; } 
        .opt-3 { background-color: #FFFACD; } .opt-4 { background-color: #D5E8D4; } .opt-5 { background-color: #D4E6F1; }

        .emoji { font-size: 2.5rem; margin-right: 15px; flex-shrink: 0; }
        .option-btn .bpmf-char { font-size: 1.5rem; }
        .option-btn .bpmf-symbols { font-size: 0.6rem; }

        /* 超大悄悄話文字框設計 */
        #textAns {
            width: 100%;
            max-width: 600px;
            height: 250px;
            padding: 20px;
            font-size: 1.2rem;
            font-family: inherit;
            border: 2px solid #ddd;
            border-radius: 15px;
            outline: none;
            resize: vertical; 
            box-sizing: border-box;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); 
        }
        #textAns:focus {
            border-color: #ff8c00;
            background-color: #fffaf0; 
        }

        /* 感謝畫面 */
        #page-thankyou { text-align: center; }
        .thankyou-emoji { font-size: 5rem; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="page-login">
        <h1>🎤 族語直播課：真心話大調查 🎤</h1>
        <div class="reminder">⚠️ 本頁請由學校承辦人或協同人員協助輸入</div>
        <div class="admin-form">
            <label>🏫 學生就讀學校：</label>
            <input type="text" id="schoolInput" placeholder="請輸入學校名稱">
            <label>👤 學生姓名：</label>
            <input type="text" id="nameInput" placeholder="請輸入學生姓名">
            <button class="btn-next" onclick="startSurvey()">開始填寫 🚀</button>
        </div>
    </div>

    <div id="page-survey" style="display: none;">
        <div class="survey-header">
            <button id="backBtn" class="btn-back-top" style="display: none;" onclick="goBack()"></button>
            <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
        </div>

        <div id="questionsContainer" style="display: flex; flex-direction: column; align-items: center; width: 100%;"></div>
        
        <div class="btn-container">
            <button id="submitBtn" class="btn-submit" style="display: none;" onclick="submitSurvey()">送出問卷 📤</button>
        </div>
    </div>

    <div id="page-thankyou" style="display: none;">
        <div class="thankyou-emoji">🎉</div>
        <div id="thankYouBpmf"></div>
    </div>

</div>

    ];

    let currentPath = []; 
    let answers = {};
    const optColors = ["opt-1", "opt-2", "opt-3", "opt-4", "opt-5"];

    function generateBpmfHTML(text, bpmfArray) {
        let html = '<div class="bpmf-container">';
        let bIndex = 0;
        const ignore = ['，', '？', '！', '。', '、', '（', '）', '：'];
        for (let char of text) {
            if (ignore.includes(char)) { html += `<span class="bpmf-punct">${char}</span>`; continue; }
            let bpmf = bpmfArray[bIndex++] || "";
            let tone = '', light = '', base = bpmf;
            if (base.startsWith('˙')) { light = '˙'; base = base.substring(1); }
            else if (['ˊ', 'ˇ', 'ˋ'].includes(base.slice(-1))) { tone = base.slice(-1); base = base.slice(0,-1); }
            html += `<span class="bpmf-word"><span class="bpmf-char">${char}</span><span class="bpmf-symbols">${light}${base.split('').join('<br>')}<span class="bpmf-tone">${tone}</span></span></span>`;
        }
        return html + '</div>';
    }

    function startSurvey() {
        const s = document.getElementById('schoolInput').value;
        const n = document.getElementById('nameInput').value;
        if(!s || !n) return alert('請老師協助填寫學校與姓名！');
        answers.school = s; answers.name = n;
        document.getElementById('page-login').style.display='none';
        document.getElementById('page-survey').style.display='block';

        // ★ 更新：在這裡動態生成「上一題」的注音 HTML ★
        const backBtnBpmf = generateBpmfHTML("上一題", ["ㄕㄤˋ", "ㄧˋ", "ㄊㄧˊ"]);
        document.getElementById('backBtn').innerHTML = `<span style="font-size:1.5rem; margin-right:5px;">⬅️</span>` + backBtnBpmf;

        renderQuestion('q1');
    }

    function renderQuestion(qId) {
        const q = surveyData.find(d => d.id === qId);
        const container = document.getElementById('questionsContainer');
        container.innerHTML = generateBpmfHTML(q.text, q.bpmf);
        
        if(q.type === 'text') {
            container.innerHTML += `<div class="reminder">💡 本題可由學校老師或協同人員協助輸入文字</div>
                                   <textarea id="textAns" placeholder="請在這裡輸入想說的話...">${answers.q8 || ''}</textarea>`;
            document.getElementById('submitBtn').style.display = 'block';
        } else {
            let optHtml = '<div class="options-grid">';
            q.options.forEach((o, i) => {
                const sel = answers[qId] === o.val ? 'selected' : '';
                optHtml += `<div class="option-btn ${optColors[i]} ${sel}" onclick="select('${qId}', '${o.val}', '${o.next || q.next}')">
                                <span class="emoji">${o.emoji}</span>${generateBpmfHTML(o.text, o.bpmf)}</div>`;
            });
            container.innerHTML += optHtml + '</div>';
            document.getElementById('submitBtn').style.display = 'none';
        }
        document.getElementById('backBtn').style.display = currentPath.length > 0 ? 'flex' : 'none'; // 使用 flex 確保圖示和注音對齊
        updateProgress();
    }

    function select(qId, val, next) {
        answers[qId] = val;
        currentPath.push(qId);
        renderQuestion(next);
    }

    function goBack() {
        if(currentPath.length > 0) {
            if(document.getElementById('textAns')) {
                answers.q8 = document.getElementById('textAns').value;
            }
            const prevId = currentPath.pop();
            renderQuestion(prevId);
        }
    }

    function updateProgress() {
        const p = (currentPath.length / 8) * 100;
        document.getElementById('progressBar').style.width = p + '%';
    }

    function submitSurvey() {
        if(document.getElementById('textAns')) {
            answers.q8 = document.getElementById('textAns').value;
        }
        console.log("Submit Data:", answers);
        document.getElementById('page-survey').style.display = 'none';
        document.getElementById('page-thankyou').style.display = 'block';
        
        const thanks1 = "太棒了！問卷已經完成！";
        const b1 = ["ㄊㄞˋ","ㄅㄤˋ","ㄌㄜ","ㄨㄣˋ","ㄐㄩㄢˋ","ㄧˇ","ㄐㄧㄥ","ㄨㄢˊ","ㄔㄥˊ"];
        const thanks2 = "謝謝你的幫忙，你超棒的！";
        const b2 = ["ㄒㄧㄝˋ","ㄒㄧㄝˋ","ㄋㄧˇ","˙ㄉㄜ","ㄅㄤ","ㄇㄤˊ","ㄋㄧˇ","ㄔㄠ","ㄅㄤˋ","˙ㄉㄜ"];
        
        document.getElementById('thankYouBpmf').innerHTML = `<h1>${generateBpmfHTML(thanks1, b1)}</h1><h2>${generateBpmfHTML(thanks2, b2)}</h2>`;
    }
